<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Meine Visitenkarte</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<main class="grid">
    <section class="foreground">

        <header class="erstesDrittel">
            <img src="Foto.jpg" id="bild" alt="Profilbild von Alexander Stach">

            <h1>Alexander Stach</h1>
            <h2>Junior Webentwickler</h2>

            <nav>
                <a href="https://github.com/AudioSonic" target="_blank" class="btn">
                    <img src="GitHub_icon.png" class="buttonIcons" alt="Das Logo von GitHub">
                    GitHub
                </a>

                <a href="https://www.linkedin.com/in/stachalex/" target="_blank" class="btn">
                    <img src="LinkedIn_icon.png" class="buttonIcons" alt="Das Logo von LinkedIn">
                    LinkedIn
                </a>
            </nav>
        </header>

        <hr>

        <section>
            <p>
                Ich lerne HTML, CSS & JavaScript, um tolle Webseiten zu bauen.
            </p>

            <div id="ueberMich">
                <button class="btn primary">Mehr über mich</button>
            </div>
        </section>

        <section id="ueberMichText">
            <hr>
            <h2>Über mich</h2>
            <p>
                Hallo! Ich bin Alex, ein leidenschaftlicher Technik-Enthusiast. <br>
                In meiner Freizeit koche ich gerne und gehe gerne wandern.
            </p>
        </section>

    </section>
</main>

<script src="script.js"></script>
</body>
</html>
